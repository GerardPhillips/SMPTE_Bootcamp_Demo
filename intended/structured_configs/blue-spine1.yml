loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.0.0.51/32
management_interfaces:
- name: Management1
  description: oob_management_interface
  shutdown: false
  vrf: default
  ip_address: 192.168.0.21/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: 7280CR3A-32S
  rack: Blue_Spines
  pod_name: Blue
  dc_name: SMPTE-Bootcamp
  fabric_name: FABRIC
  cv_tags:
    device_tags:
    - name: topology_hint_datacenter
      value: SMPTE-Bootcamp
    - name: topology_hint_fabric
      value: FABRIC
    - name: topology_hint_pod
      value: Blue
    - name: topology_hint_type
      value: spine
    - name: topology_hint_rack
      value: Blue_Spines
    - name: Campus
      value: DC1
    - name: Campus-Pod
      value: Pod1
    - name: Role
      value: Spine
ntp:
  local_interface:
    name: Management1
    vrf: default
  servers:
  - name: 192.168.0.1
    preferred: true
  vrf: default
ptp:
  mode: boundary
  clock_identity: 00:1C:73:14:00:01
  priority1: 20
  priority2: 1
  domain: 127
  monitor:
    enabled: true
    threshold:
      offset_from_master: 250
      mean_path_delay: 1500
    missing_message:
      sequence_ids:
        enabled: true
        announce: 3
        delay_resp: 3
        follow_up: 3
        sync: 3
router_bgp:
  as: '65201'
  router_id: 10.0.0.51
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  neighbors:
  - ip_address: 10.0.0.193
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65211'
    metadata:
      peer: blue-leaf1
    description: blue-leaf1_Ethernet49/1
  - ip_address: 10.0.0.195
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65212'
    metadata:
      peer: blue-leaf2
    description: blue-leaf2_Ethernet49/1
  - ip_address: 10.0.0.197
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65213'
    metadata:
      peer: blue-leaf3
    description: blue-leaf3_Ethernet49/1
  - ip_address: 10.0.0.163
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65301'
    metadata:
      peer: ptp-leaf-1
    description: ptp-leaf-1_Ethernet2
  - ip_address: 10.0.0.167
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65302'
    metadata:
      peer: ptp-leaf-2
    description: ptp-leaf-2_Ethernet2
  redistribute:
    connected:
      enabled: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
router_multicast:
  ipv4:
    routing: true
router_pim_sparse_mode:
  ipv4:
    rp_addresses:
    - address: 10.0.0.51
service_routing_protocols_model: multi-agent
static_routes:
- vrf: default
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan2222
  description: PTP-Vlan
  shutdown: false
  metadata:
    tenants:
    - FABRIC
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 2222
  name: PTP-Vlan
  metadata:
    tenants:
    - FABRIC
vrfs:
- name: default
  ip_routing: false
