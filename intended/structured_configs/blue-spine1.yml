event_monitor:
  enabled: true
hostname: blue-spine1
ip_igmp_snooping:
  globally_enabled: true
ip_name_server:
  vrfs:
  - name: default
    servers:
    - ip_address: 169.254.169.254
ip_routing: true
load_interval:
  default: 5
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$ttzoDdVO8Uz2SiBF$Ge.hQWy9wPGWyGc9.Q/mMyjycNO.9ylh40Vc.0iiqU/MtR7MKKIuOgbKkOeD3EpPMtN2SBForxog2ZCqv0kbu0
- name: cvpadmin
