!
no enable password
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$ttzoDdVO8Uz2SiBF$Ge.hQWy9wPGWyGc9.Q/mMyjycNO.9ylh40Vc.0iiqU/MtR7MKKIuOgbKkOeD3EpPMtN2SBForxog2ZCqv0kbu0
username cvpadmin privilege 15 role network-admin secret sha512 $6$1Pc3ROtR8hgKWcLF$5Omj3zu099g/NlwhFAnH7xdB8qgr.oj6JQg47idGFLE1DLyyZzKJ02zD39OoDVxvr8WDnOElNziH24RDyJ43j1
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=192.168.0.5:9910 -cvauth=token,/tmp/token -cvvrf=default -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -taillogs -cvsourceintf=Management1
   no shutdown
!
vlan internal order ascending range 1006 1199
!
event-monitor
!
load-interval default 5
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname ptp-leaf-1
ip name-server vrf default 169.254.169.254
!
ptp clock-identity 00:1C:73:0a:00:01
ptp domain 127
ptp mode boundary
ptp priority1 10
ptp priority2 1
ptp monitor threshold offset-from-master 250
ptp monitor threshold mean-path-delay 1500
ptp monitor sequence-id
ptp monitor threshold missing-message sync 3 sequence-ids
ptp monitor threshold missing-message follow-up 3 sequence-ids
ptp monitor threshold missing-message delay-resp 3 sequence-ids
ptp monitor threshold missing-message announce 3 sequence-ids
!
vlan 2222
   name PTP-Vlan
!
aaa authorization exec default local
aaa authorization commands all default local
!
interface Ethernet1
   description P2P_red-spine1_Ethernet4/1
   no shutdown
   mtu 9214
   no switchport
   ip address 10.0.0.161/31
   pim ipv4 sparse-mode
   ptp enable
   ptp announce interval 0
   ptp announce timeout 3
   ptp delay-req interval -3
   ptp sync-message interval -3
   ptp transport ipv4
!
interface Ethernet2
   description P2P_blue-spine1_Ethernet4/1
   no shutdown
   mtu 9214
   no switchport
   ip address 10.0.0.163/31
   pim ipv4 sparse-mode
   ptp enable
   ptp announce interval 0
   ptp announce timeout 3
   ptp delay-req interval -3
   ptp sync-message interval -3
   ptp transport ipv4
!
interface Ethernet46
   description P2P_ptp-leaf-2_Ethernet46
   no shutdown
   mtu 9214
   no switchport
   ip address 10.0.0.242/31
   pim ipv4 sparse-mode
   ptp enable
   ptp announce interval 0
   ptp announce timeout 3
   ptp delay-req interval -3
   ptp sync-message interval -3
   ptp transport ipv4
!
interface Ethernet47
   description P2P_ptp-leaf-2_Ethernet47
   no shutdown
   mtu 9214
   no switchport
   ip address 10.0.0.240/31
   pim ipv4 sparse-mode
   ptp enable
   ptp announce interval 0
   ptp announce timeout 3
   ptp delay-req interval -3
   ptp sync-message interval -3
   ptp transport ipv4
!
interface Ethernet48
   description PTP Grandmaster 1
   no shutdown
   speed forced 1000full
   switchport access vlan 2222
   switchport mode access
   switchport
   ptp enable
   ptp announce interval 0
   ptp announce timeout 3
   ptp delay-req interval -3
   ptp sync-message interval -3
   ptp transport ipv4
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.0.0.81/32
!
interface Management1
   description oob_management_interface
   no shutdown
   ip address 192.168.0.31/24
!
interface Vlan2222
   description PTP-Vlan
   no shutdown
   ip address 10.10.1.254/24
!
ip routing
!
ip route 0.0.0.0/0 192.168.0.1
!
ntp local-interface Management1
ntp server 192.168.0.1 prefer
!
router bgp 65301
   router-id 10.0.0.81
   update wait-install
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 10.0.0.160 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.0.0.160 remote-as 65101
   neighbor 10.0.0.160 description red-spine1_Ethernet4/1
   neighbor 10.0.0.162 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.0.0.162 remote-as 65201
   neighbor 10.0.0.162 description blue-spine1_Ethernet4/1
   neighbor 10.0.0.241 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.0.0.241 remote-as 65302
   neighbor 10.0.0.241 description ptp-leaf-2
   neighbor 10.0.0.243 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.0.0.243 remote-as 65302
   neighbor 10.0.0.243 description ptp-leaf-2
   redistribute connected
   !
   address-family ipv4
      neighbor IPv4-UNDERLAY-PEERS activate
!
router multicast
   ipv4
      routing
!
end
