---
veos:
  username: cvpadmin
  password: Arista123
  version: 4.35.4M
cvp:
  username: root
  password: cvproot
  version: 2026.1.0
  instance: singlenode
generic:
  username: arista
  password: Arista123
  version: rocky-8-10
nodes:
  - cvp:
      ip_addr: 192.168.0.5
      node_type: cvp
      auto_configuration: true
      onboard_device: true
      instance_type: xlarge
  - rocky:
      ip_addr: 192.168.0.6
      node_type: generic

  # Red Fabric
  - red-spine1:
      ip_addr: 192.168.0.11
      node_type: veos
      device_model: 7280CR3A-32S
  - red-leaf1:
      ip_addr: 192.168.0.13
      node_type: veos
      device_model: 7280SR3-48YC8
  - red-leaf2:
      ip_addr: 192.168.0.14
      node_type: veos
      device_model: 7280SR3-48YC8
  - red-leaf3:
      ip_addr: 192.168.0.15
      node_type: veos
      device_model: 7280SR3-48YC8

  # Blue Fabric
  - blue-spine1:
      ip_addr: 192.168.0.21
      node_type: veos
      device_model: 7280CR3A-32S
  - blue-leaf1:
      ip_addr: 192.168.0.23
      node_type: veos
      device_model: 7280SR3-48YC8
  - blue-leaf2:
      ip_addr: 192.168.0.24
      node_type: veos
      device_model: 7280SR3-48YC8
  - blue-leaf3:
      ip_addr: 192.168.0.25
      node_type: veos
      device_model: 7280SR3-48YC8

  # PTP Distribution
  - ptp-leaf-1:
      ip_addr: 192.168.0.31
      node_type: veos
      device_model: 720XP-48Y6
  - ptp-leaf-2:
      ip_addr: 192.168.0.32
      node_type: veos
      device_model: 720XP-48Y6

links:
  # ==========================================
  # Red Fabric: leafs to red-spine1
  # ==========================================
  - connection:
      - red-leaf1:Ethernet49/1
      - red-spine1:Ethernet1/1
  - connection:
      - red-leaf2:Ethernet49/1
      - red-spine1:Ethernet2/1
  - connection:
      - red-leaf3:Ethernet49/1
      - red-spine1:Ethernet3/1

  # ==========================================
  # Blue Fabric: leafs to blue-spine1
  # ==========================================
  - connection:
      - blue-leaf1:Ethernet49/1
      - blue-spine1:Ethernet1/1
  - connection:
      - blue-leaf2:Ethernet49/1
      - blue-spine1:Ethernet2/1
  - connection:
      - blue-leaf3:Ethernet49/1
      - blue-spine1:Ethernet3/1

  # ==========================================
  # PTP Distribution: ptp-leafs to spines
  # ==========================================
  - connection:
      - ptp-leaf-1:Ethernet1
      - red-spine1:Ethernet4/1
  - connection:
      - ptp-leaf-1:Ethernet2
      - blue-spine1:Ethernet4/1
  - connection:
      - ptp-leaf-2:Ethernet1
      - red-spine1:Ethernet5/1
  - connection:
      - ptp-leaf-2:Ethernet2
      - blue-spine1:Ethernet5/1

  # ==========================================
  # PTP Distribution: peer links for BMCA
  # ==========================================
  - connection:
      - ptp-leaf-1:Ethernet47
      - ptp-leaf-2:Ethernet47
  - connection:
      - ptp-leaf-1:Ethernet46
      - ptp-leaf-2:Ethernet46
