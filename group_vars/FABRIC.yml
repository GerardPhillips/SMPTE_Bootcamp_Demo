---
fabric_name: FABRIC
dc_name: SMPTE-Bootcamp

generate_cv_tags:
  topology_hints: true
  device_tags:
    - name: Campus
      value: DC1
    - name: Campus-Pod
      value: Pod1

network_ports: "{{ lookup('file', 'media_hosts.yml') | from_yaml }}"

# Underlay routing protocol
underlay_routing_protocol: ebgp
underlay_multicast_pim_sm: true
# No EVPN/VXLAN overlay for ST2110
overlay_routing_protocol: none

default_interfaces:
  - types: [spine]
    platforms: [default]
    downlink_interfaces: [Ethernet1/1, Ethernet2/1, Ethernet3/1, Ethernet4/1, Ethernet5/1]

  - types: [l3leaf]
    platforms: [default]
    uplink_interfaces: [Ethernet49/1]

ptp_settings:
  enabled: true
  profile: aes67-r16-2016
  domain: 127

# Local users
aaa_settings:
  local_users:
    - name: admin
      privilege: 15
      role: network-admin
      sha512_password: $6$ttzoDdVO8Uz2SiBF$Ge.hQWy9wPGWyGc9.Q/mMyjycNO.9ylh40Vc.0iiqU/MtR7MKKIuOgbKkOeD3EpPMtN2SBForxog2ZCqv0kbu0

    - name: cvpadmin
      privilege: 15
      role: network-admin
      sha512_password: $6$1Pc3ROtR8hgKWcLF$5Omj3zu099g/NlwhFAnH7xdB8qgr.oj6JQg47idGFLE1DLyyZzKJ02zD39OoDVxvr8WDnOElNziH24RDyJ43j1

  authorization:
    exec:
      default: local
    commands:
      all_default: local

# eAPI
management_eapi:
  enable_https: true
  enable_http: true

# BGP peer groups
bgp_peer_groups:
  ipv4_underlay_peers:
    name: IPv4-UNDERLAY-PEERS

# Management interface
mgmt_interface_settings:
  interface: Management1
  vrf: default
  description: oob_management_interface

mgmt_gateway: 192.168.0.1
mgmt_destination_networks:
  - 0.0.0.0/0

# NTP
ntp_settings:
  server_vrf: use_mgmt_interface_vrf
  servers:
    - name: 192.168.0.1

# CloudVision
cv_settings:
  onprem_clusters:
    - name: primary
      servers:
        - name: 192.168.0.5
      token_file: /tmp/token

custom_structured_configuration_ip_name_server:
  vrfs:
    - name: default
      servers:
        - ip_address: 169.254.169.254

custom_structured_configuration_event_monitor:
  enabled: true

custom_structured_configuration_load_interval:
  default: 5

# PTP peer links between distribution switches for BMCA
l3_edge:
  p2p_links:
    - nodes: [ptp-leaf-1, ptp-leaf-2]
      interfaces: [Ethernet47, Ethernet47]
      ip: [10.0.0.240/31, 10.0.0.241/31]
      as: [65301, 65302]
      ptp:
        enabled: true
    - nodes: [ptp-leaf-1, ptp-leaf-2]
      interfaces: [Ethernet46, Ethernet46]
      ip: [10.0.0.242/31, 10.0.0.243/31]
      as: [65301, 65302]
      ptp:
        enabled: true

# Custom node types to disable VXLAN and set PTP priorities
custom_node_type_keys:
  - key: spine
    type: spine
    connected_endpoints: true
    default_evpn_role: none
    network_services:
      l2: true
      l3: true
    vtep: false
    cv_tags_topology_type: spine
    default_ptp_priority1: 20

  - key: l3leaf
    type: l3leaf
    connected_endpoints: true
    default_evpn_role: none
    network_services:
      l2: true
      l3: true
    vtep: false
    cv_tags_topology_type: leaf
    default_ptp_priority1: 30

  - key: ptpleaf
    type: ptpleaf
    connected_endpoints: true
    default_evpn_role: none
    network_services:
      l2: true
      l3: true
    vtep: false
    cv_tags_topology_type: leaf
    default_ptp_priority1: 10

# sFlow for CVP flow tracking
sflow_settings:
  destinations:
    - destination: 127.0.0.1
